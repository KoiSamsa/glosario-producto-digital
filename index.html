/* ═══════════════════════════════════════════════════════════════
   CSS VIVO DE PRODUCCIÓN · Koi Samsa v7.4.3 (koisamsa.com)

/* ═══════════════════════════════════════════════════════════════
   Koi Samsa · CSS v7.4.3 · WordPress / Salient · 2026-06-11

   DESTINO: Customizer → Apariencia → Personalizar → CSS adicional
            (id dynamic-css-inline-css). NO el post 1806 — está vacío.

   ESTRUCTURA (dos ejes: CAPAS × SCOPES)
   Bloque 0 · TOKENS            · única fuente de valores (DTCG)
   Bloque 1 · SCOPE EDITORIAL   · prose + marginalia + asides
   Bloque 2 · COMPONENTES I     · cards, tags, chips, faq
   Bloque 3 · COMPONENTES II    · ficha portfolio
   Bloque 4 · SCOPE ARTEFACTO   · embeds Lab
   Bloque 5 · SCOPE WP · archive · category/tag/author
   Bloque 6 · COMPONENTES III   · breadcrumbs, meta, notices, tablas, focus
   Bloque 7 · SCOPE WP · folios  · camisas + afinados de contexto
   Bloque 8 · SCOPE WP · chasis  · Layer 3 — ÚNICO bloque con !important

   CUÁNDO EDITARLO
   · Color, tamaño o espaciado → SOLO Bloque 0.
   · Identidad Notes/Lab/Studio → su bloque de scope.
   · Pelear con Salient/Nectar → Bloque 8, respetando doctrina !important.

   QUÉ NO TOCAR NUNCA
   · No añadir hex fuera del Bloque 0.
   · No añadir !important fuera del Bloque 8.
   · No usar @layer: Salient vive fuera de cascade layers; meter este
     paquete en @layer invertiría la cascada. Decisión consciente.
   · No cargar fuentes con @import: IBM Plex entra vía <link> en
     Header Scripts (WPCode). @import aquí bloquearía el render.

   ROLLBACK: pegar snapshot v7.3.0
             (Vault03/08_WEB/00 DOCUMENTACIÓN/CSS/_ARCHIVO/)
   ═══════════════════════════════════════════════════════════════ */


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 0 · TOKENS — única fuente de valores hardcoded         ║
   ║ No añadir hex fuera de este bloque.                           ║
   ║ Las escalas de color y tokens sin consumidor en este archivo  ║
   ║ se conservan — el HTML publicado en WP también los referencia.║
   ╚══════════════════════════════════════════════════════════════╝ */

:root {

  /* ── Tipografía · VOCES MUDA (firmadas 2026-06-27) ──────────────
     serif     → Newsreader  (prosa, términos, títulos de marca)
     sans/UI   → Albert Sans (interfaz, H3) · peso real = nominal +1
     condensed → Fira Sans   (labels, datos, H4 · ≈Frutiger en caps)
     mono      → Fira Code   (IDs, scope artefacto)                 */
  --ks-typography-family-sans:      "Albert Sans",  system-ui, sans-serif;
  --ks-typography-family-serif:     "Newsreader",   Georgia, serif;
  --ks-typography-family-mono:      "Fira Code",    monospace;
  --ks-typography-family-condensed: "Fira Sans",    sans-serif;

  /* ── Interlineado POR VOZ (candidato MUDA · 2026-06-27) ─────────
     Cada familia pide su propio ritmo vertical. La norma única 1.5x
     era herencia de IBM Plex (altura-x grande); Newsreader es más
     esbelta y se desestructura con tanto interlineado → pide menos.
     Tokens preparados para promover al CSS canónico v7.4.3.
       serif → 1.40 (Newsreader cuerpo · antes 1.55)
       sans  → 1.50 (Albert cuerpo · validado, sin cambio)
       tight → 1.15 (títulos, ambas familias)                       */
  --ks-typography-leading-serif: 1.4;
  --ks-typography-leading-sans:  1.45;
  --ks-typography-leading-tight: 1.15;
  /* Respiro tras un párrafo introductorio: MAYOR que la separación
     normal entre párrafos, para que el intro "abra" el bloque. */
  --ks-typography-space-after-intro: var(--ks-space-xl, 32px);


  /* ── Color de marca · 11 piezas ─────────────────────────────── */

  /* Extremos materiales */
  --ks-color-brand-hierro:  #2B200F;
  --ks-color-brand-niquel:  #B3B7B8;
  --ks-color-brand-calcio:  #FAF9F7;
  --ks-color-brand-caliza:  #D1CBBA;

  /* Primarios */
  --ks-color-brand-rojo:     #AC4952;
  --ks-color-brand-turquesa: #00A6AB;
  --ks-color-brand-cobalto:  #335E82;

  /* Secundarios */
  --ks-color-brand-terra-rossa:    #CE837A;
  --ks-color-brand-marmol-rosa:    #EDC4BD;
  --ks-color-brand-malva-eritrina: #AE6586;
  --ks-color-brand-verde-patina:   #9DC5B9;

  /* Alias semánticos */
  --ks-color-ink:    var(--ks-color-brand-hierro);
  --ks-color-paper:  var(--ks-color-brand-calcio);


  /* ── Escalas tonales · 5 pasos por color (luz-2 luz-1 base som-1 som-2) ── */

  --ks-color-scale-turquesa-luz-2: #9BD6D4;
  --ks-color-scale-turquesa-luz-1: #5DBFC0;
  --ks-color-scale-turquesa-base:  #00A6AB;
  --ks-color-scale-turquesa-som-1: #008B96;
  --ks-color-scale-turquesa-som-2: #00707F;

  --ks-color-scale-rojo-luz-2: #CB8D85;
  --ks-color-scale-rojo-luz-1: #C06968;
  --ks-color-scale-rojo-base:  #AC4952;
  --ks-color-scale-rojo-som-1: #873642;
  --ks-color-scale-rojo-som-2: #612734;

  --ks-color-scale-cobalto-luz-2: #808EA2;
  --ks-color-scale-cobalto-luz-1: #5A7594;
  --ks-color-scale-cobalto-base:  #335E82;
  --ks-color-scale-cobalto-som-1: #00486D;
  --ks-color-scale-cobalto-som-2: #003254;

  --ks-color-scale-hierro-luz-2: #514E46;
  --ks-color-scale-hierro-luz-1: #3E3629;
  --ks-color-scale-hierro-base:  #2B200F;
  --ks-color-scale-hierro-som-1: #1D0B00;
  --ks-color-scale-hierro-som-2: #1B0700;

  --ks-color-scale-niquel-luz-2: #F2EDEA;
  --ks-color-scale-niquel-luz-1: #D3D2D0;
  --ks-color-scale-niquel-base:  #B3B7B8;
  --ks-color-scale-niquel-som-1: #969CA2;
  --ks-color-scale-niquel-som-2: #7A828C;

  --ks-color-scale-caliza-luz-2: #F8F4E0;
  --ks-color-scale-caliza-luz-1: #EDE8D2;
  --ks-color-scale-caliza-base:  #D1CBBA;
  --ks-color-scale-caliza-som-1: #B9AE9E;
  --ks-color-scale-caliza-som-2: #A19385;

  /* verde-níquel canon iter12 (firmado 2026-06-28): base = swatch firmado #9DC5B9,
     sombra quiebra a OLIVA (#74AF97→#2F8F67), no al gris-verdoso anterior */
  --ks-color-scale-verde-patina-luz-2: #BDD9D1;
  --ks-color-scale-verde-patina-luz-1: #ADCFC5;
  --ks-color-scale-verde-patina-base:  #9DC5B9;
  --ks-color-scale-verde-patina-som-1: #74AF97;
  --ks-color-scale-verde-patina-som-2: #2F8F67;

  --ks-color-scale-malva-eritrina-luz-2: #C8A7B6;
  --ks-color-scale-malva-eritrina-luz-1: #BB869F;
  --ks-color-scale-malva-eritrina-base:  #AE6586;
  --ks-color-scale-malva-eritrina-som-1: #8A4768;
  --ks-color-scale-malva-eritrina-som-2: #66304D;

  --ks-color-scale-terra-rossa-luz-2: #E8C7BE;
  --ks-color-scale-terra-rossa-luz-1: #DAA59A;
  --ks-color-scale-terra-rossa-base:  #CE837A;
  --ks-color-scale-terra-rossa-som-1: #A86359;
  --ks-color-scale-terra-rossa-som-2: #82443C;

  --ks-color-scale-marmol-rosa-luz-2: #F8E5DF;
  --ks-color-scale-marmol-rosa-luz-1: #F0D5CE;
  --ks-color-scale-marmol-rosa-base:  #EDC4BD;
  --ks-color-scale-marmol-rosa-som-1: #C9A19A;
  --ks-color-scale-marmol-rosa-som-2: #A57E78;

  /* ── Rampas Método A · stop 600 (CIELab) ─────────────────────────
     ⚠ DEUDA · NO ES MUDA: copia manual del stop 600 de cada familia
     desde el canon `ks-rampas-metodo-A.css` (13 familias × 10 stops,
     generadas en CIELab por aproximación). En MUDA maduro estos tokens
     vendrían del generador (tokens.json), no copiados a mano aquí.
     Se embeben solo porque el artefacto es autónomo y el chip activo
     del glosario consume el 600 (regla canónica: fondo 600 + blanco sin
     negrita = AA 4.5:1 en las 13). Stop 600 = único nivel que el
     glosario usa hoy; si se necesitan más, traer del generador, no ampliar
     este parche a mano. Trazable para wiki-sync (semilla: generador MUDA). */
  --ks-color-scale-turquesa-a-600:        #00757B;
  --ks-color-scale-cobalto-a-600:         #42698C;
  --ks-color-scale-malva-eritrina-a-600:  #974E70;
  --ks-color-scale-verde-patina-a-600:    #456D62;
  --ks-color-scale-rojo-a-600:            #AC4952;
  --ks-color-scale-terra-rossa-a-600:     #99514A;
  --ks-color-scale-niquel-a-600:          #626667;
  --ks-color-scale-hierro-a-600:          #706454;
  --ks-color-scale-marmol-rosa-a-600:     #825C56;
  --ks-color-scale-calcio-a-600:          #666564;
  --ks-color-scale-caliza-a-600:          #6B6555;
  --ks-color-scale-cobre-a-600:           #98550F;
  --ks-color-scale-amarillo-goethita-a-600: #706700;


  /* ── Superficies ─────────────────────────────────────────────── */
  --ks-surface-bg:       #FAF9F7;
  --ks-surface-default:  #FBFAF7;
  --ks-surface-muted:    #F6F6F3;
  --ks-surface-elevated: #FFFFFF;


  /* ── Tints funcionales ───────────────────────────────────────── */
  --ks-color-tint-teal-05: #EAF2F2;
  --ks-color-tint-teal-06: #D9E8E9;
  --ks-color-tint-teal-22: #A6CECF;

  --ks-color-tint-red-05:  #F8EEEE;
  --ks-color-tint-red-06:  #F3E1E1;
  --ks-color-tint-red-22:  #E2B6B7;

  --ks-color-tint-blue-05: #EEF1F5;   /* candidato a poda — verificar WP */
  --ks-color-tint-blue-06: #DFE6EE;   /* candidato a poda — verificar WP */
  --ks-color-tint-blue-22: #B3C3D5;   /* candidato a poda — verificar WP */

  --ks-color-tint-beige-10: #EFEEEA;
  --ks-color-tint-beige-20: #E5E2DB;  /* candidato a poda — verificar WP */
  --ks-color-tint-beige-50: #D0CCBF;


  /* ── Cobre · .ks-aside-derivada ─────────────────────────────── */
  --ks-color-copper-surface: #F7F2EC;  /* fondo nota derivada · cobre ~6% */
  --ks-color-copper-rule:    #F0E0D2;  /* filete lateral · cobre ~20%     */
  --ks-color-copper-label:   #C67E3E;  /* label · cobre vivo 500          */
  --ks-color-copper-link:    #B06A2E;  /* enlace                          */
  --ks-color-copper-hover:   #8F551F;  /* enlace hover                    */


  /* ── Texto · opacidades sobre hierro ────────────────────────── */
  --ks-color-text-87: rgba(43, 32, 15, 0.87);
  --ks-color-text-78: rgba(43, 32, 15, 0.78);
  --ks-color-text-72: rgba(43, 32, 15, 0.72);
  --ks-color-text-62: rgba(43, 32, 15, 0.62);
  --ks-color-text-55: rgba(43, 32, 15, 0.55);
  --ks-color-text-52: rgba(43, 32, 15, 0.52);
  --ks-color-text-45: rgba(43, 32, 15, 0.45);
  --ks-color-text-38: rgba(43, 32, 15, 0.38);
  --ks-color-text-28: rgba(43, 32, 15, 0.28);
  --ks-color-text-04: rgba(43, 32, 15, 0.04);  /* fondo discreto · .ks-aside-concept--quiet */


  /* ── Bordes ──────────────────────────────────────────────────── */
  --ks-color-border-default: rgba(43, 32, 15, 0.10);
  --ks-color-border-strong:  rgba(43, 32, 15, 0.17);


  /* ── Sombras ─────────────────────────────────────────────────── */
  --ks-shadow-soft:            0 1px 0 rgba(43, 32, 15, 0.08);   /* candidato a poda — verificar WP */
  --ks-shadow-card:            0 0 0 1px rgba(43, 32, 15, 0.07), 0 1px 0 rgba(43, 32, 15, 0.08);
  --ks-shadow-float:           0 4px 16px rgba(29, 20, 12, 0.10);
  --ks-shadow-column-elevated: 0 2px 20px rgba(43, 32, 15, 0.06); /* WPBakery columns con bg inline */


  /* ── Radios ──────────────────────────────────────────────────── */
  --ks-radius-sm: 5px;
  --ks-radius-md: 10px;
  --ks-radius-lg: 15px;


  /* ── Espaciado ───────────────────────────────────────────────── */
  --ks-space-xs:  8px;
  --ks-space-sm:  12px;
  --ks-space-md:  18px;
  --ks-space-lg:  24px;
  --ks-space-xl:  32px;
  --ks-space-2xl: 48px;
  --ks-space-3xl: 72px;
  --ks-space-4xl: 100px;  /* candidato a poda — verificar WP */


  /* ── Tamaños tipográficos ────────────────────────────────────── */
  --ks-typography-size-body-l: 20px;
  --ks-typography-size-body-m: 17px;
  --ks-typography-size-body-s: 15px;

  --ks-typography-size-h2: 36px;
  --ks-typography-size-h3: 22px;
  --ks-typography-size-h4: 14px;

  --ks-typography-size-meta-l:  13px;
  --ks-typography-size-meta-m:  12px;
  --ks-typography-size-meta-s:  11px;
  --ks-typography-size-meta-xs: 10px;

  --ks-typography-prose-size: var(--ks-typography-size-body-l);
  --ks-typography-prose-line: 1.72;
  --ks-typography-prose-max:  680px;


  /* ── Héroe · clamp() · usado desde HTML publicado ───────────── */
  --ks-size-hero-xl: clamp(48px, 13.6vw, 180px);
  --ks-size-hero-l:  clamp(36px, 8vw,    96px);
  --ks-size-hero-m:  clamp(28px, 5vw,    52px);
  --ks-size-display: clamp(24px, 3.5vw,  40px);


  /* ── Layout · chasis Salient ────────────────────────────────── */
  --ks-size-header-offset:  64px;    /* alto efectivo de #header-outer en posts */
  --ks-size-embed-min:      500px;   /* min-height de artefactos embebidos      */
  --ks-size-embed-iframe:   600px;   /* alto por defecto iframe artefacto       */
  --ks-size-folio-blog:     92%;     /* ancho del .container en single-post     */
  --ks-size-folio-blog-max: 1600px;  /* tope del .container en pantallas grandes */


  /* ── Gradientes · usados desde HTML publicado (heros) ─────── */
  --ks-gradient-teal:      linear-gradient(160deg, #FFFFFF 0%, #D9E8E9 50%, #00A6AB 100%);
  --ks-gradient-teal-blue: linear-gradient(160deg, #FFFFFF 0%, #D9E8E9 35%, #00A6AB 65%, #335E82 100%);


  /* ── Motion ─────────────────────────────────────────────────── */
  --ks-motion-easing-default:   cubic-bezier(0.4, 0, 0.2, 1);
  --ks-motion-duration-default: 0.3s;
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 1 · SCOPE EDITORIAL — identidad Notes · lectura        ║
   ║                                                                ║
   ║ Tipografía prose serif, marginalia, asides (×3), pullquote,   ║
   ║ highlight, fuentes al pie y strip de revisión.                 ║
   ║                                                                ║
   ║ Activación via :is(.ks-scope-editorial, .ks-prose,            ║
   ║   .single-post/.single-portfolio .wpb_text_column/.content-   ║
   ║   inner). El HTML publicado actual no necesita la clase;       ║
   ║   HTML futuro usa .ks-scope-editorial directamente.            ║
   ║                                                                ║
   ║ ⚠ NO sustituir :is() por :where() — especificidad cero        ║
   ║   pierde contra el theme. Overrides en Bloque 7.              ║
   ╚══════════════════════════════════════════════════════════════╝ */

/* Cuerpo prose · serif para lectura sostenida */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-post .content-inner,
    .single-portfolio .wpb_text_column,
    .single-portfolio .content-inner) {
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-prose-size);
  line-height: var(--ks-typography-prose-line);
  color:       var(--ks-color-text-87);
  max-width:   var(--ks-typography-prose-max);
}

:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) p {
  margin-bottom: 1.1em;
  text-wrap:     pretty;
}

:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) li {
  margin-bottom: 0.4em;
}

/* Jerarquía editorial (h1-h4, h6). h5 reservado. */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) h1 {
  font-family:    var(--ks-typography-family-serif);
  font-size:      var(--ks-size-hero-m);
  font-weight:    600;
  line-height:    1.1;
  letter-spacing: -0.01em;
  color:          var(--ks-color-ink);
  margin-bottom:  var(--ks-space-lg);
  text-wrap:      balance;
}

:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) h2 {
  font-family:   var(--ks-typography-family-serif);
  font-size:     var(--ks-typography-size-h2);
  font-weight:   600;
  line-height:   1.2;
  color:         var(--ks-color-ink);
  margin-top:    var(--ks-space-2xl);
  margin-bottom: var(--ks-space-lg);
  text-wrap:     balance;
}

:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) h3 {
  font-family:   var(--ks-typography-family-sans);
  font-size:     var(--ks-typography-size-h3);
  font-weight:   600;
  line-height:   1.3;
  color:         var(--ks-color-ink);
  margin-top:    var(--ks-space-xl);
  margin-bottom: var(--ks-space-md);
  text-wrap:     balance;
}

:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) h4 {
  font-family:    var(--ks-typography-family-condensed);
  font-size:      var(--ks-typography-size-h4);
  font-weight:    600;
  line-height:    1.4;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color:          var(--ks-color-brand-turquesa);
  margin-top:     var(--ks-space-xl);
  margin-bottom:  var(--ks-space-sm);
}

:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) h6 {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    400;
  line-height:    1.5;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color:          var(--ks-color-text-45);
  margin-bottom:  var(--ks-space-xs);
}

/* Blockquote — citas de terceros. Conceptos propios usan
   .ks-callout (Bloque 6) o .ks-aside-concept (este bloque). */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) blockquote {
  border-left:  3px solid var(--ks-color-brand-turquesa);
  padding-left: var(--ks-space-lg);
  margin:       var(--ks-space-xl) 0;
  font-style:   italic;
  color:        var(--ks-color-text-72);
}

/* Links · turquesa con underline, hover a cobalto */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) a {
  color:                 var(--ks-color-brand-turquesa);
  text-decoration:       underline;
  text-underline-offset: 2px;
  transition:            color var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) a:hover {
  color: var(--ks-color-brand-cobalto);
}

/* Inline code */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) code {
  font-family:   var(--ks-typography-family-mono);
  font-size:     0.85em;
  background:    var(--ks-surface-muted);
  padding:       2px 6px;
  border-radius: var(--ks-radius-sm);
}

/* Imágenes del prose */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) img {
  max-width:     100%;
  height:        auto;
  border-radius: var(--ks-radius-md);
  margin:        var(--ks-space-lg) 0;
}

/* Separador horizontal */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) hr {
  border:     none;
  border-top: 1px solid var(--ks-color-border-default);
  margin:     var(--ks-space-2xl) 0;
}

/* ── Marginalia y componentes editoriales ─────────────────────── */

/* Revisado strip · cabecera con fecha de última revisión */
.ks-revisado-strip {
  display:       flex;
  flex-wrap:     wrap;
  align-items:   baseline;
  gap:           var(--ks-space-sm);
  margin:        var(--ks-space-md) 0 var(--ks-space-lg);
  padding:       12px 16px;   /* afinado local: caja compacta fuera de la escala — racional v5.2 */
  background:    var(--ks-color-tint-teal-05);
  border-left:   3px solid var(--ks-color-brand-turquesa);
  border-radius: var(--ks-radius-sm);
}
.ks-revisado-strip__label {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color:          var(--ks-color-brand-turquesa);
  white-space:    nowrap;
}
.ks-revisado-strip__text {
  font-family: var(--ks-typography-family-serif);
  font-size:   14px;   /* afinado local entre meta-l (13) y body-s (15) — decisión visual v5.2 */
  font-style:  italic;
  color:       var(--ks-color-text-72);
  line-height: 1.5;
}

/* Grid editorial 3-2 · texto + marginalia */
.ks-grid-3-2 {
  display:               grid;
  grid-template-columns: 3fr 2fr;
  gap:                   var(--ks-space-xl);
  margin:                var(--ks-space-xl) 0;
  align-items:           start;
}
.ks-grid-3-2 > .ks-col-aside { font-size: 0.95em; }

/* Asides BEM · tres niveles de énfasis:
   concept (alto · turquesa) · card (medio · gris) · note (bajo · filete).
   derivada (cobre) no es nivel de énfasis: es FUNCIÓN — remisión a
   pieza hermana del nodo. */
.ks-aside-concept {
  background:    var(--ks-color-tint-teal-05);
  border-radius: var(--ks-radius-md);
  padding:       var(--ks-space-md) var(--ks-space-lg);
  margin-bottom: var(--ks-space-md);
}
.ks-aside-concept__label {
  display:        block;
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-xs);
  font-weight:    600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color:          var(--ks-color-brand-turquesa);
  margin-bottom:  var(--ks-space-xs);
}
.ks-aside-concept__body {
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-size-body-s);
  line-height: 1.55;
  color:       var(--ks-color-text-87);
}
.ks-aside-concept__body strong { color: var(--ks-color-ink); }

/* Variante --quiet · gris discreto. Modifier BEM, no override por
   contexto: se aplica como clase, nunca por selector de página. */
.ks-aside-concept--quiet {
  background:    var(--ks-color-text-04);
  padding:       var(--ks-space-md) var(--ks-space-lg);
  margin-bottom: var(--ks-space-lg);
  border-radius: var(--ks-radius-sm);
  font-size:     var(--ks-typography-size-meta-l);
  line-height:   1.55;
  color:         var(--ks-color-text-62);
}
.ks-aside-concept--quiet p {
  font-size:   var(--ks-typography-size-meta-l);
  line-height: 1.55;
  color:       var(--ks-color-text-62);
  margin:      0 0 var(--ks-space-xs) 0;
}
.ks-aside-concept--quiet p:last-child { margin-bottom: 0; }
.ks-aside-concept--quiet strong { color: var(--ks-color-text-78); }
.ks-aside-concept--quiet em {
  font-size:  var(--ks-typography-size-meta-l);
  font-style: italic;
}

.ks-aside-card {
  background:    var(--ks-surface-muted);
  border:        1px solid var(--ks-color-border-default);
  border-radius: var(--ks-radius-sm);
  padding:       var(--ks-space-sm) var(--ks-space-md);
  margin-bottom: var(--ks-space-md);
}
.ks-aside-card__label {
  display:        block;
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-xs);
  font-weight:    500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color:          var(--ks-color-text-55);
  margin-bottom:  6px;   /* afinado local: medio paso bajo xs — racional v7.0 */
}
.ks-aside-card__body {
  font-family: var(--ks-typography-family-serif);
  font-size:   14px;   /* afinado local 14px — ver racional en revisado-strip */
  line-height: 1.55;
  color:       var(--ks-color-text-72);
}
.ks-aside-card__body strong { color: var(--ks-color-ink); }

.ks-aside-note {
  font-family:   var(--ks-typography-family-serif);
  font-size:     14px;   /* afinado local 14px — ver racional en revisado-strip */
  line-height:   1.55;
  color:         var(--ks-color-text-72);
  margin-bottom: var(--ks-space-md);
  padding-left:  var(--ks-space-sm);
  border-left:   1px solid var(--ks-color-border-default);
}

/* Aside derivada · cobre · remisión a pieza hermana del nodo.
   Color = función, no énfasis. Cobre de scope, no del canon. */
.ks-aside-derivada {
  background:    var(--ks-color-copper-surface);
  border-left:   3px solid var(--ks-color-copper-rule);
  border-radius: var(--ks-radius-sm);
  padding:       var(--ks-space-sm) var(--ks-space-md);
  margin-bottom: var(--ks-space-md);
}
.ks-aside-derivada__label {
  display:        block;
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-xs);
  font-weight:    600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color:          var(--ks-color-copper-label);
  margin-bottom:  6px;   /* afinado local: paridad con aside-card__label */
}
.ks-aside-derivada__label::before { content: "\2193  "; }
.ks-aside-derivada__body {
  font-family: var(--ks-typography-family-serif);
  font-size:   14px;   /* afinado local 14px — ver racional en revisado-strip */
  line-height: 1.55;
  color:       var(--ks-color-text-72);
}
.ks-aside-derivada__body strong { color: var(--ks-color-ink); }
.ks-aside-derivada__body a {
  color:           var(--ks-color-copper-link);
  text-decoration: none;
  border-bottom:   1px dotted var(--ks-color-copper-rule);
}
.ks-aside-derivada__body a:hover { color: var(--ks-color-copper-hover); }

/* Asides ligeros legacy · atajos pre-BEM en posts antiguos.
   Para piezas nuevas: h6 de prose o BEM completo. */
.ks-aside-label {
  display:        block;
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-xs);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color:          var(--ks-color-text-45);
  margin-bottom:  var(--ks-space-xs);
}
.ks-aside-link {
  display:         block;
  font-family:     var(--ks-typography-family-mono);
  font-size:       var(--ks-typography-size-meta-m);
  color:           var(--ks-color-brand-turquesa);
  text-decoration: none;
  margin-bottom:   var(--ks-space-xs);
  padding:         0 var(--ks-space-xs);
}
.ks-aside-link:hover { text-decoration: underline; }

/* Pullquote · frase propia destacada (terceros → <blockquote>) */
.ks-pullquote {
  font-family:  var(--ks-typography-family-serif);
  font-size:    18px;   /* afinado local entre body-m y body-l — decisión visual v5.2 */
  font-style:   italic;
  line-height:  1.45;
  color:        var(--ks-color-ink);
  padding-left: var(--ks-space-md);
  border-left:  3px solid var(--ks-color-brand-turquesa);
  margin:       var(--ks-space-md) 0;
}

/* Highlight · resalte tipo marcador */
.ks-highlight {
  background: linear-gradient(180deg,
                              transparent 55%,
                              var(--ks-color-tint-teal-22) 55%,
                              var(--ks-color-tint-teal-22) 92%,
                              transparent 92%);
  padding: 0 2px;
}

/* Editorial text · cuerpo sans compacto para UI editorial */
.ks-editorial-text {
  font-family: var(--ks-typography-family-sans);
  font-size:   var(--ks-typography-size-body-m);
  line-height: 1.65;
  color:       var(--ks-color-text-87);
}

/* Overline legacy · piezas pre-refundación. Letter-spacing 0.14em
   por convención visual de posts antiguos — distinta del h6 (0.06)
   y del card-overline (0.08). */
.ks-overline {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  letter-spacing: 0.14em;
  color:          var(--ks-color-text-45);
  text-transform: uppercase;
}

/* Caption serif · pie de imagen editorial */
.ks-caption-serif {
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-size-meta-l);
  font-style:  italic;
  color:       var(--ks-color-text-52);
  line-height: 1.5;
  margin-top:  var(--ks-space-xs);
  text-align:  left;
}

/* Sources · referencias al pie. font-family: inherit hereda serif
   del prose. Especificidad 0-1-1, suficiente sin !important. */
ol.ks-sources,
ol.ks-sources li {
  font-family: inherit;
  font-size:   var(--ks-typography-size-meta-l);
  line-height: 1.7;
  color:       var(--ks-color-text-55);
  font-weight: 400;
}
ol.ks-sources li em { font-style: italic; }
ol.ks-sources li a {
  color:           var(--ks-color-brand-turquesa);
  text-decoration: underline;
  font-weight:     400;
}
ol.ks-sources li a:hover { color: var(--ks-color-scale-turquesa-som-1); }

/* Responsive scope editorial */
@media (max-width: 960px) {
  .ks-grid-3-2 {
    grid-template-columns: 1fr;
    gap:                   var(--ks-space-md);
  }
  .ks-grid-3-2 > .ks-col-aside { margin-top: var(--ks-space-sm); }
  .ks-aside-concept,
  .ks-aside-card { margin-bottom: var(--ks-space-md); }
  .ks-pullquote  { font-size: 16px; }   /* afinado local — escala del 18px base */
}
@media (max-width: 768px) {
  :is(.ks-scope-editorial, .ks-prose,
      .single-post .wpb_text_column,
      .single-portfolio .wpb_text_column) {
    font-size:   18px;   /* afinado local responsive — racional v6.0 */
    line-height: 1.65;
  }
}
@media (max-width: 600px) {
  .ks-revisado-strip { flex-direction: column; gap: 6px; }
  .ks-revisado-strip__text { font-size: 13px; }
}
@media (max-width: 480px) {
  :is(.ks-scope-editorial, .ks-prose,
      .single-post .wpb_text_column,
      .single-portfolio .wpb_text_column) h2 { font-size: 28px; }
  :is(.ks-scope-editorial, .ks-prose,
      .single-post .wpb_text_column,
      .single-portfolio .wpb_text_column) h3 { font-size: 19px; }
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 2 · Layer 2 · COMPONENTES I — cards, tags, chips        ║
   ║                                                                ║
   ║ Piezas de calibre universal: consumibles desde cualquier       ║
   ║ scope (hoy las usan los índices Lab/Notes). NO son un scope.   ║
   ║ ACTIVACIÓN: por clase de componente (.ks-card, .ks-tag,        ║
   ║ .ks-chip) en HTML propio.                                      ║
   ║ CUÁNDO EDITAR: rediseño de cards/etiquetas/filtros.            ║
   ╚══════════════════════════════════════════════════════════════╝ */

.ks-card {
  background:    var(--ks-surface-default);
  border-radius: var(--ks-radius-lg);
  box-shadow:    var(--ks-shadow-card);
  overflow:      hidden;
  transition:    box-shadow var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
.ks-card:hover { box-shadow: var(--ks-shadow-float); }
.ks-card-body  { padding: var(--ks-space-lg); }
.ks-card-overline {
  font-family:    var(--ks-typography-family-condensed);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color:          var(--ks-color-brand-turquesa);
  margin-bottom:  var(--ks-space-xs);
}
.ks-card-title {
  font-family:   var(--ks-typography-family-serif);
  font-size:     var(--ks-typography-size-body-l);
  font-weight:   400;
  line-height:   1.3;
  color:         var(--ks-color-ink);
  margin-bottom: var(--ks-space-sm);
  text-wrap:     balance;
}
.ks-card-desc {
  font-family: var(--ks-typography-family-sans);
  font-size:   var(--ks-typography-size-body-s);
  line-height: 1.5;
  color:       var(--ks-color-text-78);
}
.ks-card-meta {
  font-family: var(--ks-typography-family-mono);
  font-size:   var(--ks-typography-size-meta-s);
  color:       var(--ks-color-text-52);
  margin-top:  var(--ks-space-sm);
}

/* Tag · etiqueta no interactiva */
.ks-tag {
  display:        inline-block;
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color:          var(--ks-color-text-55);
  background:     var(--ks-surface-muted);
  border:         1px solid var(--ks-color-border-default);
  border-radius:  var(--ks-radius-sm);
  padding:        4px 10px;   /* afinado local: chip compacto — racional v7.0 */
  line-height:    1.4;
}
.ks-tag a       { color: inherit; text-decoration: none; transition: color var(--ks-motion-duration-default) var(--ks-motion-easing-default); }
.ks-tag a:hover { color: var(--ks-color-brand-turquesa); }
.ks-tag--node {
  background:   var(--ks-color-tint-teal-05);
  border-color: var(--ks-color-tint-teal-22);
  color:        var(--ks-color-brand-turquesa);
}

/* Chip · interactivo (filtros) */
.ks-chip {
  font-family:   var(--ks-typography-family-sans);
  font-size:     var(--ks-typography-size-meta-l);
  color:         var(--ks-color-text-78);
  background:    transparent;
  border:        1px solid var(--ks-color-border-default);
  border-radius: 999px;
  padding:       4px var(--ks-space-sm);
  cursor:        pointer;
  transition:
    color            var(--ks-motion-duration-default) var(--ks-motion-easing-default),
    border-color     var(--ks-motion-duration-default) var(--ks-motion-easing-default),
    background-color var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
.ks-chip:hover,
.ks-chip.active {
  color:        var(--ks-color-ink);
  border-color: var(--ks-color-ink);
  background:   var(--ks-surface-muted);
}

/* FAQ acordeón · preguntas frecuentes. <details>/<summary> nativo,
   cero JS, cero !important. Portado de visual guidelines v6.1.1
   (vg-faq-* → ks-faq-*); integrado en v7.4.2 con tokens canónicos
   (corregido --ks-color-brand-teal → turquesa: el alias ya no existe
   en este paquete). Componente Layer 2: cualquier post puede usarlo. */
.ks-faq {
  margin: var(--ks-space-xl) 0;
}
.ks-faq-titulo {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-l);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color:          var(--ks-color-text-55);
  font-weight:    500;
  margin-bottom:  var(--ks-space-lg);
}
.ks-faq-item {
  border-top: 1px solid var(--ks-color-border-default);
  margin-top: -1px;   /* afinado local: colapsa bordes contiguos del acordeón */
}
.ks-faq-item:last-child {
  border-bottom: 1px solid var(--ks-color-border-default);
}
.ks-faq-item summary {
  list-style:  none;
  cursor:      pointer;
  padding:     14px 28px 14px 0;   /* afinado local: caja de pregunta + hueco del marcador — racional v6.1.1 */
  font-family: var(--ks-typography-family-sans);
  font-size:   var(--ks-typography-size-body-s);
  font-weight: 500;
  color:       var(--ks-color-text-87);
  line-height: 1.5;
  position:    relative;
  user-select: none;
  transition:  color var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
.ks-faq-item summary::-webkit-details-marker { display: none; }
.ks-faq-item summary::after {
  content:   "\2304";
  position:  absolute;
  right:     4px;    /* afinado local: marcador pegado al borde óptico */
  top:       50%;
  transform: translateY(-60%);
  font-size: 22px;   /* afinado local: marcador a tamaño de glifo, no de texto */
  color:     var(--ks-color-text-45);
  transition: transform var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
.ks-faq-item[open] summary::after {
  transform: translateY(-30%) rotate(180deg);
}
.ks-faq-item summary:hover {
  color: var(--ks-color-text-62);
}
.ks-faq-item summary:focus-visible {
  outline:        2px solid var(--ks-color-brand-turquesa);
  outline-offset: 2px;
  border-radius:  var(--ks-radius-sm);
}
.ks-faq-answer {
  padding:     0 0 var(--ks-space-md) 0;
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-size-body-s);
  line-height: 1.7;
  color:       var(--ks-color-text-72);
}
.ks-faq-answer p {
  margin: 0 0 var(--ks-space-sm) 0;
}
.ks-faq-answer p:last-child { margin-bottom: 0; }
.ks-faq-answer strong { color: var(--ks-color-text-87); }
.ks-faq-answer em { font-style: italic; }
@media (max-width: 600px) {
  .ks-tag { font-size: var(--ks-typography-size-meta-xs); padding: 3px 8px; }
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 3 · Layer 2 · COMPONENTES II — ficha portfolio          ║
   ║                                                                ║
   ║ Componente de ficha (Studio/Artwork). NO es un scope: el       ║
   ║ prose de single-portfolio entra por el scope editorial         ║
   ║ (puente del Bloque 1); esta ficha es Layer 2.                  ║
   ║ ACTIVACIÓN: clases propias (.ks-portfolio-*).                  ║
   ║ CUÁNDO EDITAR: rediseño de fichas de proyecto/obra.            ║
   ╚══════════════════════════════════════════════════════════════╝ */

.ks-portfolio-header {
  display:               grid;
  grid-template-columns: 1fr 1fr;
  gap:                   var(--ks-space-2xl);
  margin-top:            var(--ks-space-xl);
  margin-bottom:         var(--ks-space-2xl);
  padding-bottom:        var(--ks-space-2xl);
  border-bottom:         1px solid var(--ks-color-border-default);
}
.ks-portfolio-meta-grid {
  display:               grid;
  grid-template-columns: auto 1fr;
  gap:                   6px var(--ks-space-lg);   /* afinado local: medio paso bajo xs */
  font-family:           var(--ks-typography-family-mono);
  font-size:             var(--ks-typography-size-meta-m);
  line-height:           1.5;
  color:                 var(--ks-color-text-52);
}
.ks-portfolio-meta-grid dt {
  font-family:    var(--ks-typography-family-condensed);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color:          var(--ks-color-text-45);
  padding-top:    1px;   /* afinado local: alineación óptica dt/dd */
}
.ks-portfolio-meta-grid dd {
  font-family: var(--ks-typography-family-mono);
  font-size:   var(--ks-typography-size-meta-m);
  color:       var(--ks-color-text-62);
}

@media (max-width: 768px) {
  .ks-portfolio-header {
    grid-template-columns: 1fr;
    gap:                   var(--ks-space-lg);
  }
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 4 · SCOPE ARTEFACTO — identidad Lab · embeds            ║
   ║                                                                ║
   ║ ACTIVACIÓN: solo clase explícita .ks-scope-artefacto /         ║
   ║ .ks-artefacto-*. Sin puente WP — los artefactos son HTML       ║
   ║ propio siempre.                                                ║
   ║ CUÁNDO EDITAR: cambios del marco de embeds del Lab.            ║
   ╚══════════════════════════════════════════════════════════════╝ */

.ks-scope-artefacto {
  box-sizing:  border-box;
  font-family: var(--ks-typography-family-sans);
  color:       var(--ks-color-text-87);
  line-height: 1.5;
}
.ks-scope-artefacto *,
.ks-scope-artefacto *::before,
.ks-scope-artefacto *::after {
  box-sizing: inherit;
}

.ks-artefacto-embed {
  width:         100%;
  min-height:    var(--ks-size-embed-min);
  border:        1px solid var(--ks-color-border-default);
  border-radius: var(--ks-radius-md);
  background:    var(--ks-surface-elevated);
  overflow:      hidden;
}
.ks-artefacto-embed iframe {
  width:  100%;
  height: var(--ks-size-embed-iframe);
  border: none;
}

.ks-artefacto-placeholder {
  display:         flex;
  align-items:     center;
  justify-content: center;
  min-height:      var(--ks-size-embed-min);
  background:      var(--ks-surface-muted);
  border-radius:   var(--ks-radius-md);
  font-family:     var(--ks-typography-family-mono);
  font-size:       14px;   /* afinado local 14px — paridad con asides editoriales */
  color:           var(--ks-color-text-38);
  letter-spacing:  0.04em;
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 5 · SCOPE WORDPRESS-SALIENT · tramo archive             ║
   ║ category / tag / author                                        ║
   ║                                                                ║
   ║ Pertenece al scope wordpress-salient del catálogo: restyling   ║
   ║ del render del theme, no identidad propia.                     ║
   ║ ACTIVACIÓN: body.archive (clase nativa WP — el archivo no      ║
   ║ tiene HTML propio, se restyla el render de Salient).           ║
   ║ Alinea el archive con /notes/ sin tocar Theme Options.         ║
   ║ 5 frentes: header editorial · grid 3-cols · tipografía KS en   ║
   ║ cards · chips hierro · paginación. La camisa de folio (ancho   ║
   ║ del container) vive en el Bloque 8 — necesita !important.      ║
   ║ CUÁNDO EDITAR: rediseño de archives.                           ║
   ╚══════════════════════════════════════════════════════════════╝ */

/* Header del archive · editorialización */
body.archive .blog-archive-header {
  margin-bottom:  var(--ks-space-xl);
  padding-bottom: var(--ks-space-md);
  border-bottom:  1px solid var(--ks-color-text-28);
}
body.archive .blog-archive-header .section-title h1 {
  font-family:    var(--ks-typography-family-serif);
  font-weight:    400;
  font-size:      var(--ks-size-hero-m);
  line-height:    1.15;
  letter-spacing: -0.01em;
  color:          var(--ks-color-ink);
  margin:         0;
}
body.archive .blog-archive-header .section-title h1 small,
body.archive .blog-archive-header .nectar-archive-tax-count {
  display:        inline-block;
  margin-left:    var(--ks-space-md);
  padding:        2px 8px;   /* afinado local: contador compacto */
  background:     var(--ks-color-brand-turquesa);
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    500;
  letter-spacing: 0.08em;
  color:          var(--ks-surface-elevated);
  vertical-align: middle;
  border-radius:  var(--ks-radius-sm);
}
body.archive .blog-archive-header .term-description,
body.archive .blog-archive-header .taxonomy-description {
  margin-top:  var(--ks-space-md);
  max-width:   62ch;
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-size-body-m);
  font-style:  italic;
  line-height: 1.55;
  color:       var(--ks-color-text-72);
}

/* Grid 3 cols como /notes/ — sin tocar marcado de Salient */
body.archive .nectar-post-grid {
  display:               grid;
  grid-template-columns: repeat(3, 1fr);
  gap:                   var(--ks-space-lg);
  background:            transparent;
}
@media (max-width: 999px) {
  body.archive .nectar-post-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  body.archive .nectar-post-grid { grid-template-columns: 1fr; }
}
body.archive .nectar-post-grid-item {
  width:         auto;
  grid-column:   auto;
  grid-row:      auto;
  border-radius: var(--ks-radius-md);
  overflow:      hidden;
}

/* Cards · text-color dark + tipografía KS */
body.archive .nectar-post-grid-wrap.text-color-light {
  background: transparent;
}
body.archive .nectar-post-grid-item h2,
body.archive .nectar-post-grid-item h2 a,
body.archive .nectar-post-grid-item .post-title,
body.archive .nectar-post-grid-item .post-title a {
  font-family:    var(--ks-typography-family-serif);
  font-weight:    500;
  font-size:      var(--ks-typography-size-h3);
  line-height:    1.25;
  letter-spacing: -0.005em;
  color:          var(--ks-color-ink);
}

/* Chips de categoría · SOLO pinta el enlace, no el contenedor.
   Fix 2026-06-03 (auditoría GPT 3.1): el contenedor llevaba fondo y
   producía doble chip / banda turquesa. Patrón único de chip de
   categoría en todo el sitio: HIERRO + mono (ver Bloque 8 para la
   variante a.style-button sobre imagen). */
body.archive .nectar-post-grid-item .meta-category,
body.archive .nectar-post-grid-item .category {
  display:       inline;
  background:    transparent;
  padding:       0;
  border-radius: 0;
}
body.archive .nectar-post-grid-item .meta-category a,
body.archive .nectar-post-grid-item a.category {
  display:         inline-block;
  padding:         3px 8px;   /* afinado local: chip compacto */
  background:      var(--ks-color-brand-hierro);
  font-family:     var(--ks-typography-family-mono);
  font-size:       var(--ks-typography-size-meta-s);
  font-weight:     500;
  letter-spacing:  0.08em;
  text-transform:  none;
  color:           var(--ks-surface-elevated);
  border-radius:   var(--ks-radius-sm);
  text-decoration: none;
}
body.archive .nectar-post-grid-item .date,
body.archive .nectar-post-grid-item .meta-date,
body.archive .nectar-post-grid-item time,
body.archive .nectar-post-grid-item .author,
body.archive .nectar-post-grid-item .meta-author {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-m);
  color:          var(--ks-color-text-52);
  letter-spacing: 0.02em;
}
body.archive .nectar-post-grid-item .excerpt,
body.archive .nectar-post-grid-item p {
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-size-body-s);
  line-height: 1.55;
  color:       var(--ks-color-text-78);
}

/* Fallback layout clásico (si blog_type cambia) */
.archive .post .post-header h2,
.archive .post .post-header h2 a {
  font-family: var(--ks-typography-family-serif);
  color:       var(--ks-color-ink);
}
.archive .post .post-meta .date,
.archive .post .post-meta .meta-author {
  font-family: var(--ks-typography-family-mono);
  font-size:   var(--ks-typography-size-meta-s);
  color:       var(--ks-color-text-52);
}

/* Paginación */
body.archive .pagination,
body.archive .nav-links {
  margin-top:     var(--ks-space-xl);
  padding-top:    var(--ks-space-md);
  border-top:     1px solid var(--ks-color-text-28);
  font-family:    var(--ks-typography-family-condensed);
  font-size:      var(--ks-typography-size-body-s);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
body.archive .pagination a,
body.archive .nav-links a {
  color: var(--ks-color-brand-turquesa);
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 6 · Layer 2 · COMPONENTES III — navegación, meta,       ║
   ║ avisos, tablas, accesibilidad                                  ║
   ║ Piezas de calibre universal compartidas entre scopes.          ║
   ║ CUÁNDO EDITAR: cambios que deben verse igual en todos los      ║
   ║ scopes.                                                        ║
   ╚══════════════════════════════════════════════════════════════╝ */

/* Breadcrumbs */
.ks-breadcrumbs {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  letter-spacing: 0.04em;
  color:          var(--ks-color-text-52);
  padding:        var(--ks-space-sm) var(--ks-space-lg);
  border-bottom:  1px solid var(--ks-color-border-default);
  background:     var(--ks-surface-bg);
}
.ks-breadcrumbs a {
  color:           var(--ks-color-text-52);
  text-decoration: none;
  transition:      color var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
.ks-breadcrumbs a:hover    { color: var(--ks-color-brand-turquesa); }
.ks-breadcrumbs .ks-bc-sep { margin: 0 var(--ks-space-xs); color: var(--ks-color-text-28); }

/* Variante en contexto WPBakery / single-post: transparente.
   Especificidad 0-2-0 gana al 0-1-0 base — sin !important. */
.wpb_wrapper .ks-breadcrumbs,
.single-post .ks-breadcrumbs {
  background:    transparent;
  border-bottom: none;
  padding:       0;
}

/* Article meta · ficha cabecera */
.ks-article-meta {
  display:       flex;
  flex-wrap:     wrap;
  gap:           var(--ks-space-md);
  align-items:   center;
  padding:       var(--ks-space-md) 0;
  margin-bottom: var(--ks-space-xl);
  border-bottom: 1px solid var(--ks-color-border-default);
}
.ks-article-meta .ks-meta-item {
  font-family: var(--ks-typography-family-mono);
  font-size:   var(--ks-typography-size-meta-m);
  color:       var(--ks-color-text-52);
  display:     flex;
  align-items: center;
  gap:         var(--ks-space-xs);
}
.ks-article-meta .ks-meta-node {
  font-family:    var(--ks-typography-family-condensed);
  font-size:      var(--ks-typography-size-meta-m);
  font-weight:    500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color:          var(--ks-color-brand-turquesa);
  background:     var(--ks-color-tint-teal-05);
  padding:        2px var(--ks-space-xs);
  border-radius:  var(--ks-radius-sm);
}
.ks-article-meta .ks-meta-cat a {
  font-family:     var(--ks-typography-family-sans);
  font-size:       var(--ks-typography-size-meta-l);
  color:           var(--ks-color-text-78);
  text-decoration: none;
  border:          1px solid var(--ks-color-border-default);
  border-radius:   999px;
  padding:         2px var(--ks-space-sm);
  transition:
    color        var(--ks-motion-duration-default) var(--ks-motion-easing-default),
    border-color var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
.ks-article-meta .ks-meta-cat a:hover {
  color:        var(--ks-color-ink);
  border-color: var(--ks-color-border-strong);
}

/* Overhead · barra de metadatos sobre artículo */
.ks-post-overhead {
  display:     flex;
  flex-wrap:   wrap;
  align-items: center;
  gap:         var(--ks-space-sm);
  margin-top:  var(--ks-space-md);
}
.ks-reading-time {
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-m);
  font-weight:    400;
  letter-spacing: 0.06em;
  color:          var(--ks-color-text-52);
}
.ks-overhead-sep {
  width:          1px;
  height:         14px;   /* afinado local: separador a cap-height del mono 12px */
  background:     var(--ks-color-border-strong);
  display:        inline-block;
  vertical-align: middle;
  margin:         0 2px;
}

/* Notices · información contextual */
.ks-notice {
  font-family:   var(--ks-typography-family-sans);
  font-size:     var(--ks-typography-size-body-s);
  line-height:   1.6;
  padding:       var(--ks-space-md) var(--ks-space-lg);
  border-radius: var(--ks-radius-md);
  margin:        var(--ks-space-lg) 0;
}
.ks-notice--teal  { background: var(--ks-color-tint-teal-05);  border-left: 3px solid var(--ks-color-tint-teal-22);  color: var(--ks-color-text-87); }
.ks-notice--red   { background: var(--ks-color-tint-red-05);   border-left: 3px solid var(--ks-color-tint-red-22);   color: var(--ks-color-text-87); }
.ks-notice--beige { background: var(--ks-color-tint-beige-10); border-left: 3px solid var(--ks-color-tint-beige-50); color: var(--ks-color-text-87); }

/* Callout · concepto clave propio */
.ks-callout {
  background:    var(--ks-color-tint-teal-05);
  border:        1px solid var(--ks-color-brand-turquesa);
  border-radius: var(--ks-radius-md);
  padding:       var(--ks-space-lg) var(--ks-space-xl);
  margin:        var(--ks-space-xl) 0;
}
.ks-callout-label {
  display:        block;
  font-family:    var(--ks-typography-family-mono);
  font-size:      var(--ks-typography-size-meta-s);
  font-weight:    600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color:          var(--ks-color-brand-turquesa);
  margin-bottom:  var(--ks-space-sm);
}
.ks-callout p {
  font-family: var(--ks-typography-family-serif);
  font-size:   var(--ks-typography-size-body-m);
  line-height: 1.5;
  color:       var(--ks-color-ink);
  margin:      0;
}

/* Variante neutra del callout — sin color semántico de marca.
   Para notas agnósticas de categoría (matices, trampas, avisos genéricos). */
.ks-callout--neutro {
  background: var(--ks-surface-muted);
  border-color: var(--ks-color-border-strong);
}
.ks-callout--neutro .ks-callout-label {
  color: var(--ks-color-text-52);
}
.ks-callout--neutro p {
  font-family: var(--ks-typography-family-sans);
  font-size:   var(--ks-typography-size-body-s);
  color:       var(--ks-color-text-78);
  line-height: 1.55;
}

/* Tablas */
.ks-table-prose {
  width:           100%;
  border-collapse: collapse;
  margin:          var(--ks-space-xl) 0;
}
.ks-table-prose caption {
  font-family:   var(--ks-typography-family-sans);
  font-size:     var(--ks-typography-size-meta-s);
  color:         var(--ks-color-text-45);
  text-align:    left;
  margin-bottom: var(--ks-space-xs);
}
.ks-table-prose th {
  font-family:   var(--ks-typography-family-sans);
  font-size:     var(--ks-typography-size-meta-l);
  font-weight:   600;
  text-align:    left;
  padding:       var(--ks-space-sm);
  border-bottom: 2px solid var(--ks-color-ink);
}
.ks-table-prose td {
  font-family:   var(--ks-typography-family-serif);
  font-size:     var(--ks-typography-size-body-s);
  padding:       var(--ks-space-sm);
  border-bottom: 1px solid var(--ks-color-border-default);
  color:         var(--ks-color-text-87);
}
.ks-table-data {
  width:           100%;
  border-collapse: collapse;
}
.ks-table-data th {
  font-family:    var(--ks-typography-family-condensed);
  font-size:      var(--ks-typography-size-meta-xs);
  font-weight:    400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color:          var(--ks-color-text-45);
  text-align:     left;
  padding:        var(--ks-space-xs) var(--ks-space-sm);
  border-bottom:  1px solid var(--ks-color-border-strong);
}
.ks-table-data td {
  font-family:   var(--ks-typography-family-mono);
  font-size:     var(--ks-typography-size-meta-m);
  color:         var(--ks-color-text-62);
  padding:       var(--ks-space-xs) var(--ks-space-sm);
  border-bottom: 1px solid var(--ks-color-border-default);
}
.ks-table-data td:first-child {
  font-family: var(--ks-typography-family-sans);
  font-weight: 500;
  color:       var(--ks-color-ink);
}
.ks-table-data tr:hover td { background: var(--ks-surface-muted); }

/* Focus visible · accesibilidad de teclado. Solo :focus-visible
   (no en clic de ratón). v7.4.1 extiende cobertura al scope
   editorial completo y a los enlaces de asides derivadas. */
:is(.ks-scope-editorial, .ks-prose,
    .single-post .wpb_text_column,
    .single-portfolio .wpb_text_column) a:focus-visible,
.ks-aside-derivada__body a:focus-visible,
.ks-card a:focus-visible,
.ks-tag a:focus-visible,
.ks-chip:focus-visible,
.ks-breadcrumbs a:focus-visible,
.ks-article-meta a:focus-visible {
  outline:        2px solid var(--ks-color-brand-turquesa);
  outline-offset: 3px;
  border-radius:  var(--ks-radius-sm);
}

/* Responsive transversales */
@media (max-width: 768px) {
  .ks-article-meta {
    flex-direction: column;
    align-items:    flex-start;
    gap:            var(--ks-space-sm);
  }
  .ks-breadcrumbs {
    padding:   var(--ks-space-xs) var(--ks-space-sm);
    font-size: var(--ks-typography-size-meta-xs);
  }
  .ks-table-prose,
  .ks-table-data {
    display:    block;
    overflow-x: auto;
  }
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 7 · SCOPE WORDPRESS-SALIENT · tramo folios              ║
   ║ Camisas de folio y afinados de contexto WP que se resuelven    ║
   ║ por cascada, sin !important (no son Layer 3)                   ║
   ╚══════════════════════════════════════════════════════════════╝ */

/* Camisas editoriales */
.ks-post-wrap {
  max-width:     860px;   /* medida estructural del folio post — racional v7.0 */
  margin:        var(--ks-space-3xl) auto;
  padding:       var(--ks-space-2xl) var(--ks-space-2xl) var(--ks-space-3xl);
  background:    var(--ks-surface-elevated);
  border:        1px solid var(--ks-color-border-default);
  border-radius: var(--ks-radius-lg);
  box-shadow:    var(--ks-shadow-card);
}
.ks-portfolio-wrap {
  max-width:     1100px;  /* medida estructural del folio portfolio — racional v7.0 */
  margin:        var(--ks-space-3xl) auto;
  padding:       var(--ks-space-2xl) var(--ks-space-2xl) var(--ks-space-3xl);
  background:    var(--ks-surface-elevated);
  border:        1px solid var(--ks-color-border-default);
  border-radius: var(--ks-radius-lg);
  box-shadow:    var(--ks-shadow-card);
}

/* Single posts · prose sin tope de ancho propio.
   El wrap controla el ancho (92%); el prose se libera del max-width
   canónico SOLO en posts. Variable scoping: redefinir
   --ks-typography-prose-max aquí hace que el Bloque 1 lo resuelva
   a none automáticamente. */
.single-post .wpb_text_column,
.single-post .content-inner,
.single-portfolio .wpb_text_column,
.single-portfolio .content-inner {
  /* v7.4.3: añadido single-portfolio — sin esto .content-inner
     quedaba a 680px y capaba a .ks-portfolio-wrap (1100px) por
     ser su ancestro (auditoría Codex 11-jun). */
  --ks-typography-prose-max: none;
}

/* Cuerpo de single posts · 17px / 1.75 — más compacto que el prose
   canónico. Misma especificidad que el :is() del Bloque 1: gana por
   orden de cascada (este bloque carga después). Sin !important. */
.single-post .wpb_text_column p,
.single-post .wpb_text_column li,
.single-post .content-inner > p,
.single-post .content-inner > ul li,
.single-post .content-inner > ol li {
  /* v7.4.3: .content-inner añadido — un post sin WPBakery entraba
     al prose por el puente pero no recibía el cuerpo compacto
     (auditoría Codex 11-jun). */
  font-size:   var(--ks-typography-size-body-m);
  line-height: 1.75;
}

/* h6 en single posts · overline mono con tracking ampliado (0.1em
   vs 0.06em base) y margen mayor. Gana por orden de cascada. */
.single-post .wpb_text_column h6 {
  letter-spacing: 0.1em;
  margin-bottom:  var(--ks-space-sm);
}

/* Sombra suave en columnas WPBakery con background inline */
.single-post .vc_row[data-vc-full-width] .vc_column_container[style*="background-color"] {
  box-shadow: var(--ks-shadow-column-elevated);
}

@media (max-width: 680px) {
  .ks-post-wrap,
  .ks-portfolio-wrap {
    margin:  var(--ks-space-2xl) auto;
    padding: var(--ks-space-xl) var(--ks-space-lg) var(--ks-space-2xl);
  }
}
@media (max-width: 600px) {
  .ks-post-wrap,
  .ks-portfolio-wrap {
    margin:        var(--ks-space-lg) auto;
    padding:       var(--ks-space-lg) var(--ks-space-md) var(--ks-space-xl);
    border-radius: var(--ks-radius-md);
  }
  .ks-post-overhead { gap: var(--ks-space-xs); }
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║ BLOQUE 8 · SCOPE WORDPRESS-SALIENT · tramo chasis — Layer 3    ║
   ║ Overrides del theme. ÚNICO bloque con !important admitido.     ║
   ║                                                                ║
   ║ Doctrina !important (tres clases):                             ║
   ║ A  — vs style="" o JS runtime → !important + justificación     ║
   ║      inline obligatoria.                                       ║
   ║ A' — vs CSS de Nectar/Salient con ID único de instancia        ║
   ║      (especificidad 1-x-x irreproducible). !important con flag  ║
   ║      VERIFICAR: si inspección prueba que el conflicto es CSS    ║
   ║      estático, degradar a Clase B y eliminar.                  ║
   ║ B  — vs CSS embebido de Theme Options (<style>). Sin           ║
   ║      !important: este paquete carga después y gana por cascada. ║
   ╚══════════════════════════════════════════════════════════════╝ */

/* ── 8.1 · Base global — Clase B · sin !important ──────────────
   Theme Options imprime CSS embebido; este paquete vive en el
   Customizer (wp_custom_css), que WordPress imprime DESPUÉS del
   CSS dinámico del theme — refuerza que las clases B ganen por
   orden de cascada sin !important.
   html body (0-0-2) supera el body (0-0-1) del theme.
   VERIFICAR EN FRONTEND tras el volcado: si algún valor de Salient
   sobrevive, subir especificidad ANTES de recurrir a !important. */
html body,
body .container-wrap {
  background-color: var(--ks-surface-bg);
}
html body {
  font-family: var(--ks-typography-family-sans);
  font-size:   var(--ks-typography-size-body-s);
  color:       var(--ks-color-text-87);
}
body h1, body h2, body h3,
body h4, body h5, body h6 {
  color: var(--ks-color-ink);
}

/* Links globales — reset intencional global: Salient pinta los <a>
   vía Theme Options en cualquier contexto (menú, footer, sidebar,
   plugins). Restringir el selector dejaría zonas con el color
   antiguo. Clase B. */
a {
  color:      var(--ks-color-brand-turquesa);
  transition: color var(--ks-motion-duration-default) var(--ks-motion-easing-default);
}
a:hover { color: var(--ks-color-brand-cobalto); }

/* Párrafos — reset intencional global. Salient añade
   padding-bottom: 27px a todos los <p> vía CSS heredado; sin este
   reset los párrafos acumulan doble espaciado. Clase B. */
p {
  padding-bottom: 0;
  margin-bottom:  0.8em;
}

/* Page-header de Salient oculto en posts/portfolio — Clase B:
   el display viene del CSS del theme, no de un style attribute.
   .single-post #page-header-wrap (0-1-1-1) supera al selector de
   ID del theme. VERIFICAR EN FRONTEND. */
.single-post #page-header-wrap,
.single-portfolio #page-header-wrap,
.single-post #header-space,
.single-portfolio #header-space,
.single-post .featured-media-under-header,
.single-portfolio .featured-media-under-header {
  display: none;
}

/* Footers ocultos hasta reconstruir el footer KS — Clase B para el
   display del theme. #ks-footer conserva UN !important Clase A:
   Salient inyecta display inline si el footer no está oculto desde
   Theme Options. height/overflow/visibility del v7.3.0 PODADOS:
   con display none ganando, eran ruido. */
#footer-outer { display: none; }                /* B · CSS del theme — VERIFICAR */
#ks-footer    { display: none !important; }     /* A · vs display inline de Salient */

/* Hamburger sin el texto "Menu" — clases del template, sin inline. */
.mobile-menu-toggle span,
.mobile-menu-toggle .label,
.mobile-menu-toggle .menu-text {
  display: none;
}

/* ── 8.2 · Clase A — style attribute real o JS runtime ───────── */

/* Fondo global · cobertura extendida Salient/Material.
   Salient inyecta style="background-color: …" en estos wrappers
   según el page-template activo. */
body.material,
#ajax-content-wrap,
.page-header-no-bg {
  background-color: var(--ks-surface-bg) !important;  /* A · vs style attr de Salient */
}

/* Header limpio. background/border/shadow los gestiona Salient JS
   en los estados sticky/transparent (estilos en runtime). */
#header-outer {
  background-color: var(--ks-surface-elevated) !important;               /* A' · vs JS sticky — VERIFICAR */
  border-bottom:    1px solid var(--ks-color-border-default) !important; /* A' · vs JS sticky — VERIFICAR */
  box-shadow:       none !important;                                     /* A' · vs JS sticky — VERIFICAR */
}

/* Líneas del hamburger: Salient JS escribe background-color inline
   al gestionar estados open/closed. */
#header-outer .slide-out-widget-area-toggle a .lines,
#header-outer .slide-out-widget-area-toggle a .lines::before,
#header-outer .slide-out-widget-area-toggle a .lines::after {
  background-color: var(--ks-color-ink) !important;  /* A · vs style attr de Salient JS */
}

/* search-btn — Clase B: el color viene del CSS de Theme Options.
   #header-outer #search-btn a (0-2-1-1) supera al theme. El
   !important del v7.3.0 ELIMINADO. VERIFICAR EN FRONTEND. */
#header-outer #search-btn a,
#header-outer #search-btn a .icon-salient-search,
#header-outer .icon-salient-search {
  color: var(--ks-color-ink);

/* Offset superior de posts: Salient calcula el padding-top del
   container por JS según el alto real del header. */
.single-post .container-wrap,
.single-portfolio .container-wrap {
  padding-top: var(--ks-size-header-offset) !important;  /* A' · vs padding-top JS — VERIFICAR */
}

/* ── 8.3 · Folio editorial — Clase A' ──────────────────────────
   Salient calcula max-width/width del .container por breakpoint en
   runtime. Selector limitado al hijo directo de .container-wrap
   para no afectar containers anidados de WPBakery. Si Salient
   anidara un segundo .container intermedio, ajustar el selector. */
.single-post .container-wrap > .container,
body.archive .container-wrap > .container {
  max-width: var(--ks-size-folio-blog) !important;  /* A' · vs cálculo JS por breakpoint — VERIFICAR */
  width:     var(--ks-size-folio-blog) !important;  /* A' · vs cálculo JS por breakpoint — VERIFICAR */
}
@media (min-width: 1400px) {
  .single-post .container-wrap > .container,
  body.archive .container-wrap > .container {

  }

/* ── 8.4 · Nectar post grid — Clase A' ─────────────────────────
   Nectar genera <style> en runtime con el ID único de cada grid
   (especificidad de ID irreproducible desde CSS global). Los
   !important de este grupo sobreviven por eso — NO por la antigua
   justificación "inline". Si la inspección demuestra selectores
   estáticos sin ID, degradar a Clase B y limpiar. */

.nectar-post-grid .content-meta h2 a {

}

/* Chip de categoría a.style-button sobre la imagen (overlaid).
   Nectar lo pinta como botón turquesa grande (9px 18px). Patrón KS
   único de chip de categoría: HIERRO + mono (coherente con el

   .meta-category a (layout before-title) ELIMINADA: ningún grid
   del sitio usa ya ese layout y contradecía la decisión de chip
   único — era dead code conflictivo. */
.nectar-post-grid-item .meta-category a.style-button {
  background-color: var(--ks-color-brand-hierro) !important;      /* A' · CSS Nectar con ID — VERIFICAR */
  color:            var(--ks-surface-elevated) !important;        /* A' · CSS Nectar con ID — VERIFICAR */
  font-family:      var(--ks-typography-family-mono) !important;  /* A' · CSS Nectar con ID — VERIFICAR */
  font-size:        var(--ks-typography-size-meta-s) !important;  /* A' · CSS Nectar con ID — VERIFICAR */
  font-weight:      500;
  letter-spacing:   0.08em;

/* Saneamiento SPAN .meta-category (v7.2.5 · 2026-05-27).
   Home: oculta el SPAN raw sin chips (hermano del que sí los
   tiene). Archive: quita el bg turquesa del contenedor para que
   solo los chips a.style-button pinten.
   :has() requiere Safari 15.4+ / Chrome 105+ / Firefox 121+
   (~95% global 2026). Sin soporte: comportamiento pre-fix, sin
   regresión. VERIFICADO en DOM vivo 2026-06-11 (home + archive):
   100% de los span.meta-category llevan a.style-button en esta
   config del theme — la regla no oculta categorías legítimas. */
.nectar-post-grid-item span.meta-category:not(:has(a.style-button)) {
  display: none;
}
.nectar-post-grid-item span.meta-category {
  background: transparent !important;  /* A' · CSS Nectar con ID — VERIFICAR */
  padding:    0 !important;            /* A' · CSS Nectar con ID — VERIFICAR */

.nectar-post-grid .content-meta .date,
.nectar-post-grid .content-meta .nectar-love {
  font-family: var(--ks-typography-family-mono) !important;      /* A' · CSS Nectar con ID — VERIFICAR */
  font-size:   var(--ks-typography-size-meta-s) !important;      /* A' · CSS Nectar con ID — VERIFICAR */
  color:       var(--ks-color-text-52) !important;               /* A' · CSS Nectar con ID — VERIFICAR */
